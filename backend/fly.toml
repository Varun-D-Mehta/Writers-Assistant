app = "wa-workers"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/app/data"

# Workers are internal only — no public HTTP services
# Gateway reaches them over Fly's private WireGuard network

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
